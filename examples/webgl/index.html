<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>webgl → Syphon</title>
    <style>
      html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
      canvas { display: block; width: 100vw; height: 100vh; }
      #hud { position: fixed; top: 12px; left: 14px; z-index: 10;
             font: 700 18px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
             color: #fff; text-shadow: 0 1px 4px #000, 0 0 2px #000;
             white-space: pre; pointer-events: none; letter-spacing: .5px; }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <script>
      // A WebGL fragment-shader plasma. The composited WebGL canvas is published.
      const canvas = document.getElementById('c')
      const gl = canvas.getContext('webgl', { alpha: false })

      const vs = `attribute vec2 p; void main(){ gl_Position = vec4(p, 0.0, 1.0); }`
      const fs = `precision highp float;
        uniform vec2 r; uniform float t;
        void main() {
          vec2 uv = gl_FragCoord.xy / r;
          float v = sin(uv.x*10.0 + t)
                  + sin(uv.y*10.0 + t*1.3)
                  + sin((uv.x+uv.y)*10.0 + t*0.7)
                  + sin(length(uv - vec2(0.5))*20.0 - t*2.0);
          vec3 col = 0.5 + 0.5*cos(vec3(0.0, 2.0, 4.0) + v + t*0.2);
          gl_FragColor = vec4(col, 1.0);
        }`

      function compile(type, src) {
        const s = gl.createShader(type)
        gl.shaderSource(s, src); gl.compileShader(s)
        if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s))
        return s
      }
      const prog = gl.createProgram()
      gl.attachShader(prog, compile(gl.VERTEX_SHADER, vs))
      gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fs))
      gl.linkProgram(prog)
      gl.useProgram(prog)

      const buf = gl.createBuffer()
      gl.bindBuffer(gl.ARRAY_BUFFER, buf)
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW)
      const loc = gl.getAttribLocation(prog, 'p')
      gl.enableVertexAttribArray(loc)
      gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0)
      const uR = gl.getUniformLocation(prog, 'r')
      const uT = gl.getUniformLocation(prog, 't')

      function resize() {
        const dpr = window.devicePixelRatio || 1
        canvas.width = canvas.clientWidth * dpr
        canvas.height = canvas.clientHeight * dpr
      }
      window.addEventListener('resize', resize)
      resize()

      function draw(t) {
        gl.viewport(0, 0, canvas.width, canvas.height)
        gl.uniform2f(uR, canvas.width, canvas.height)
        gl.uniform1f(uT, t / 1000)
        gl.drawArrays(gl.TRIANGLES, 0, 3)
        requestAnimationFrame(draw)
      }
      requestAnimationFrame(draw)
    </script>
    <div id="hud"></div>
    <script>
      // Frame # + timecode overlay — drawn into the page, so it shows in this
      // window AND in the published Syphon frame. If a preview is unfocused/occluded
      // macOS throttles it, so its FRAME counter falls behind the offscreen
      // publisher — that's the "sending faster than rendering on screen" effect.
      ;(function () {
        const hud = document.getElementById('hud')
        const pad = (n, l) => String(n).padStart(l || 2, '0')
        let frame = 0, t0 = null, last = 0, fps = 0
        function tick(t) {
          if (t0 === null) t0 = t
          const ms = t - t0
          if (last) { const dt = t - last; if (dt > 0) fps += (1000 / dt - fps) * 0.1 }
          last = t
          const s = Math.floor(ms / 1000)
          const ff = Math.floor((ms % 1000) / (1000 / 60)) // SMPTE frames @60, from wall time
          const tc = pad(Math.floor(s / 3600)) + ':' + pad(Math.floor(s / 60) % 60) + ':' + pad(s % 60) + ':' + pad(ff)
          hud.textContent = 'FRAME ' + pad(frame, 6) + '\nTC ' + tc + '\n' + fps.toFixed(1) + ' fps'
          frame++
          requestAnimationFrame(tick)
        }
        requestAnimationFrame(tick)
      })()
    </script>
  </body>
</html>
