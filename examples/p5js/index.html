<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>p5.js → Syphon</title>
    <style>
      html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
      canvas { display: block; }
      #hud { position: fixed; top: 12px; left: 14px; z-index: 10;
             font: 700 18px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
             color: #fff; text-shadow: 0 1px 4px #000, 0 0 2px #000;
             white-space: pre; pointer-events: none; letter-spacing: .5px; }
    </style>
    <!-- p5.js is vendored next to this file so the example runs fully offline. -->
    <script src="p5.min.js"></script>
  </head>
  <body>
    <script>
      // A p5.js flow-field sketch. p5 renders into a normal <canvas>, which the
      // page composites like anything else — so the offscreen publisher captures
      // it for Syphon with no p5-specific wiring. The canvas fills the window.
      let particles = []
      const N = 1500
      let zoff = 0

      function setup() {
        createCanvas(windowWidth, windowHeight)
        colorMode(HSB, 360, 100, 100, 100)
        for (let i = 0; i < N; i++) {
          particles.push({ x: random(width), y: random(height), px: 0, py: 0 })
        }
        background(0)
      }

      function windowResized() {
        resizeCanvas(windowWidth, windowHeight)
        background(0)
      }

      function draw() {
        // Gentle trail fade instead of a hard clear → silky ribbons.
        noStroke()
        fill(0, 0, 0, 6)
        rect(0, 0, width, height)

        const scl = 0.0018
        const hue = (frameCount * 0.4) % 360
        strokeWeight(1.4)
        for (const p of particles) {
          const a = noise(p.x * scl, p.y * scl, zoff) * TWO_PI * 2
          p.px = p.x
          p.py = p.y
          p.x += cos(a) * 2.2
          p.y += sin(a) * 2.2
          // Color shifts with flow angle + a slow global hue drift.
          stroke((hue + (a * 30)) % 360, 80, 100, 35)
          line(p.px, p.py, p.x, p.y)
          // Wrap particles that leave the canvas so the field stays full.
          if (p.x < 0 || p.x > width || p.y < 0 || p.y > height) {
            p.x = random(width)
            p.y = random(height)
          }
        }
        zoff += 0.003
      }
    </script>

    <div id="hud"></div>
    <script>
      // Frame # + timecode overlay — drawn into the page, so it shows in this
      // window AND in the published Syphon frame. If a preview is unfocused/occluded
      // macOS throttles it, so its FRAME counter falls behind the offscreen
      // publisher — that's the "sending faster than rendering on screen" effect.
      ;(function () {
        const hud = document.getElementById('hud')
        const pad = (n, l) => String(n).padStart(l || 2, '0')
        let frame = 0, t0 = null, last = 0, fps = 0
        function tick(t) {
          if (t0 === null) t0 = t
          const ms = t - t0
          if (last) { const dt = t - last; if (dt > 0) fps += (1000 / dt - fps) * 0.1 }
          last = t
          const s = Math.floor(ms / 1000)
          const ff = Math.floor((ms % 1000) / (1000 / 60)) // SMPTE frames @60, from wall time
          const tc = pad(Math.floor(s / 3600)) + ':' + pad(Math.floor(s / 60) % 60) + ':' + pad(s % 60) + ':' + pad(ff)
          hud.textContent = 'FRAME ' + pad(frame, 6) + '\nTC ' + tc + '\n' + fps.toFixed(1) + ' fps'
          frame++
          requestAnimationFrame(tick)
        }
        requestAnimationFrame(tick)
      })()
    </script>
  </body>
</html>
