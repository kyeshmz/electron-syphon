<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>single-render → Syphon (the one render)</title>
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; background: #06080c; }
      #c { display: block; width: 100vw; height: 100vh; }
      #tag { position: fixed; left: 16px; bottom: 14px; color: #fff;
             font: 800 34px/1 ui-monospace, Menlo, monospace; text-shadow: 0 2px 10px #000; opacity: .9; }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <div id="tag"></div>
    <script>
      // This is the ONE render. It is offscreen and published to Syphon. Nothing
      // re-renders it for display — the visible monitor window shows the frames
      // RECEIVED back from Syphon. So "what's on screen" is exactly this output.
      //
      // The frame number is drawn for humans AND encoded into a 40×40 block in the
      // top-left corner as rgb(frame&255, frame>>8, 192) so the monitor can decode
      // the exact frame it received (b=192 is a fixed marker).
      const canvas = document.getElementById('c')
      const ctx = canvas.getContext('2d', { alpha: false })
      const tag = document.getElementById('tag')

      function resize() {
        const dpr = window.devicePixelRatio || 1
        canvas.width = Math.round(canvas.clientWidth * dpr)
        canvas.height = Math.round(canvas.clientHeight * dpr)
      }
      window.addEventListener('resize', resize)
      resize()

      let frame = 0
      window.__frame = 0
      function draw(t) {
        const w = canvas.width, h = canvas.height, time = t / 1000, hue = (time * 25) % 360
        const g = ctx.createLinearGradient(0, 0, w, h)
        g.addColorStop(0, `hsl(${hue}, 70%, 12%)`)
        g.addColorStop(1, `hsl(${(hue + 80) % 360}, 70%, 20%)`)
        ctx.fillStyle = g
        ctx.fillRect(0, 0, w, h)

        const cx = w / 2, cy = h / 2, maxR = Math.max(w, h) * 0.7
        ctx.lineWidth = Math.max(2, w / 360)
        for (let i = 0; i < 14; i++) {
          const r = ((time * 140 + i * 46) % maxR) + 8
          ctx.strokeStyle = `hsla(${(hue + i * 18) % 360}, 90%, 65%, ${1 - r / maxR})`
          ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke()
        }
        const px = cx + Math.cos(time * 1.3) * w * 0.33, py = cy + Math.sin(time * 1.7) * h * 0.33
        ctx.fillStyle = `hsl(${(hue + 180) % 360}, 95%, 62%)`
        ctx.beginPath(); ctx.arc(px, py, Math.max(10, w / 36), 0, Math.PI * 2); ctx.fill()

        ctx.fillStyle = '#fff'
        ctx.textAlign = 'center'
        ctx.font = `800 ${Math.round(w / 14)}px ui-monospace, Menlo, monospace`
        ctx.fillText('SENT #' + frame, cx, cy + w / 42)

        // machine-readable frame number, top-left corner
        ctx.fillStyle = `rgb(${frame & 255}, ${(frame >> 8) & 255}, 192)`
        ctx.fillRect(0, 0, 40, 40)

        tag.textContent = 'offscreen renderer — the single render'
        window.__frame = frame
        frame++
        requestAnimationFrame(draw)
      }
      requestAnimationFrame(draw)
    </script>
  </body>
</html>
