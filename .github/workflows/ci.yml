name: CI

# Build + smoke-test on every push and PR so releases are never the first
# time the native addon is compiled on a clean machine.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build library (TypeScript + native prebuild + verify)
        run: pnpm run make-library

      - name: Smoke test
        run: pnpm test
